name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master # Поддерживает запуск как на ветке main, так и на master

# Разрешения для GITHUB_TOKEN для работы с GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Отменяет предыдущие запуски, если они не завершились
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        # Передаем имя репозитория в качестве базового пути для ассетов,
        # чтобы страницы загружались корректно на https://<username>.github.io/<repo-name>/
        # Также копируем index.html в 404.html для поддержки роутинга (BrowserRouter) при обновлении страниц
        run: npm run build -- --base=/${{ github.event.repository.name }}/ && cp dist/index.html dist/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
